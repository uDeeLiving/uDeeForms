<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>uDee Living</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f5f5f0; }
    iframe { width: 100%; height: 100%; border: none; }
    #loading, #error-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: linear-gradient(135deg, #f5f5f0 0%, #e8e4df 100%);
      font-family: 'Prompt', sans-serif;
      z-index: 10;
      transition: opacity 0.3s ease;
    }
    #error-screen {
      display: none;
      background: #fdf2f2;
      color: #C0392B;
      text-align: center;
      padding: 20px;
    }
    #error-screen h2 { margin-bottom: 10px; }
    #loading .spinner {
      width: 36px; height: 36px;
      border: 3px solid #d4cfc8;
      border-top-color: #A3B18A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    #loading p { color: #8B7E74; font-size: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <p>กำลังเปิดฟอร์ม...</p>
  </div>

  <div id="error-screen">
    <h2>ข้อมูลตัวตนไม่ตรงกัน ❌</h2>
    <p>บัญชี LINE ปัจจุบันของคุณ<br>ไม่ตรงกับเจ้าของลิงก์ฟอร์มนี้</p>
  </div>

  <iframe id="app-frame" onload="hideLoading()"></iframe>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    // === Google Apps Script Web App URL ===
    var GAS_URL = "https://script.google.com/macros/s/AKfycbz_XjhzbJU42Kt1k5eMfjgLLmzaDkDeL6pbKxS8a7KRCJQR2Y2c09AjLcbQ4VYEpUmogg/exec";

    function loadAppFrame(profileParams) {
      var search = window.location.search;
      var params = "";

      if (search) {
        var urlParams = new URLSearchParams(search);
        var liffState = urlParams.get("liff.state");
        if (liffState) {
          params = liffState.startsWith("?") ? liffState : "?" + liffState;
        } else {
          params = search;
        }
      }
      
      if (profileParams) {
        params += (params.indexOf("?") === -1 ? "?" : "&") + profileParams;
      }

      // โหลดฟอร์มใน iframe
      document.getElementById("app-frame").src = GAS_URL + params;
    }

    function hideLoading() {
      var el = document.getElementById("loading");
      if (el) {
        el.style.opacity = "0";
        setTimeout(function() { el.style.display = "none"; }, 300);
      }
    }

    function showError() {
      document.getElementById("loading").style.display = "none";
      document.getElementById("error-screen").style.display = "flex";
      document.getElementById("app-frame").style.display = "none";
    }

    // === ตรวจสอบความปลอดภัย (Option 2) บน Github Pages ===
    try {
      liff.init({ liffId: "2010244543-U3WWt1y7" }).then(() => {
        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
        } else {
          
          // 1. ดึงข้อมูลตัวตนปัจจุบัน
          var decoded = liff.getDecodedIDToken();
          var currentUserId = decoded ? decoded.sub : null;
          
          // 2. ดึง uid จาก URL (ถ้ามี)
          var search = window.location.search;
          var urlParams = new URLSearchParams(search);
          var liffState = urlParams.get("liff.state");
          var expectedUid = null;
          
          if (liffState) {
              var stateParams = new URLSearchParams(liffState.startsWith("?") ? liffState : "?" + liffState);
              expectedUid = stateParams.get("uid");
          } else {
              expectedUid = urlParams.get("uid");
          }

          // 3. ตรวจสอบว่าตรงกันหรือไม่ (ป้องกันการสวมรอย)
          // ถ้า URL ระบุ uid มา แต่ไม่ตรงกับ currentUserId ให้บล็อกทันที!
          if (expectedUid && currentUserId && expectedUid !== currentUserId) {
              showError();
              return;
          }

          // พยายามดึง Profile เพิ่มเติมเพื่อใช้ในหน้าลงทะเบียน
          liff.getProfile().then(profile => {
             var finalUid = profile.userId || currentUserId || "";
             var profileParams = "uid=" + encodeURIComponent(finalUid) +
                                 "&displayName=" + encodeURIComponent(profile.displayName || "") + 
                                 "&pictureUrl=" + encodeURIComponent(profile.pictureUrl || "");
             loadAppFrame(profileParams);
          }).catch(err => {
             loadAppFrame("uid=" + encodeURIComponent(currentUserId || ""));
          });
        }
      }).catch(err => {
        console.error("LIFF Init Error:", err);
        // Fallback in case LIFF fails
        loadAppFrame("");
      });
    } catch(err) {
      console.error(err);
      loadAppFrame("");
    }
  </script>

</body>
</html>
